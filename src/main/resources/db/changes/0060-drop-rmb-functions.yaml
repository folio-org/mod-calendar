databaseChangeLog:
  - changeSet:
      id: 0060-drop-rmb-functions
      author: university-of-alabama/ncovercash
      # MODCAL-150: This released changeset now qualifies RMB cleanup functions
      # with the tenant schema so DROP FUNCTION cannot fall through to public.
      # Keep the released checksum valid for existing tenant upgrades.
      validCheckSum: 9:3252f087033814e5a5cf91903c578ccd
      comment: "Delete all previous RMB functions that have not been used since 2.0.0."
      changes:
        - sql:
            sql: DROP FUNCTION IF EXISTS ${database.defaultSchemaName}.actual_opening_hours_set_md CASCADE;
        - sql:
            sql: DROP FUNCTION IF EXISTS ${database.defaultSchemaName}.audit_actual_opening_hours_changes CASCADE;
