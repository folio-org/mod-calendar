databaseChangeLog:
  - changeSet:
      id: MODCAL-150@@schema-create-function-f-unaccent
      author: ppullolickal
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: |
              SELECT count(*)
              FROM databasechangelog
              WHERE id = '0060-drop-rmb-functions'
                AND author = 'university-of-alabama/ncovercash'
      comment:
        Create a temporary tenant-local f_unaccent function that will be removed
        by the following legacy RMB cleanup changeset (0060-drop-rmb-functions.yaml).
        This prevents the unqualified DROP FUNCTION from falling through to public.f_unaccent.
      changes:
        - sql:
            sql: |
              CREATE OR REPLACE FUNCTION ${database.defaultSchemaName}.f_unaccent(text)
              RETURNS text AS $$
                SELECT $1
              $$ LANGUAGE sql IMMUTABLE PARALLEL SAFE STRICT;
      rollback:
        - sql:
            sql: DROP FUNCTION IF EXISTS ${database.defaultSchemaName}.f_unaccent(text);
